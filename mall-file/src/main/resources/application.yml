server:
  port: 8060

spring:
  application:
    name: mall-file
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.72.130:8848,192.168.72.134:8848,192.168.72.136:8848
    sentinel:
      transport:
        dashboard: 192.168.72.130:8080
        port: 8719

  datasource:
    url: jdbc:mysql://192.168.72.130:3306/mall_product?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
    username: 'dbadmin'
    password: '123456'
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    dynamic:
      primary: master
      strict: false
      datasource:
        master:
          url: jdbc:mysql://192.168.72.134:3306/mall_product?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
          username: 'dbadmin'
          password: '123456'
          driver-class-name: com.mysql.cj.jdbc.Driver
          type: com.alibaba.druid.pool.DruidDataSource
        slave:
          url: jdbc:mysql://192.168.72.134:3306/mall_product?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
          username: 'dbadmin'
          password: '123456'
          driver-class-name: com.mysql.cj.jdbc.Driver
          type: com.alibaba.druid.pool.DruidDataSource

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 100MB

  data:
    redis:
      sentinel:
        master: mymaster
        nodes:
          - 192.168.72.130:26379
          - 192.168.72.134:26379
          - 192.168.72.136:26379
      password: '123456'

sa-token:
  token-name: Authorization
  timeout: 86400
  active-timeout: -1
  is-concurrent: false
  is-share: false
  token-style: uuid
  is-read-cookie: false
  jwt-secret-key: asdasdasifhueuiwyurfewbfjsdafjkqwerty
  token-prefix: Bearer
  is-log: true

minio:
  endpoint: http://192.168.72.130:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: mall-bucket

# 启用追踪
management:
  tracing:
    enabled: true
    sampling:
      probability: 0.1

  # Zipkin 配置
  zipkin:
    tracing:
      endpoint: http://192.168.72.130:9411/api/v2/spans

  # 暴露 Actuator 端点（可选）
  endpoints:
    web:
      exposure:
        include: "*"